<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureFyul Smoothie Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#0EA5A4;--tl:#E1F5EE;--td:#085041;--n:#0F172A;--b:#E2E8F0;--bg:#fff;--bg2:#F8FAFC;--tx:#0F172A;--mu:#94A3B8;--r:12px}
body{font-family:system-ui,-apple-system,sans-serif;background:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.w{width:100%;max-width:520px;background:var(--bg);border-radius:20px;border:1px solid var(--b);overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,.08)}
.hd{background:var(--n);padding:20px 24px 18px}.lg{font-size:18px;font-weight:700;color:#fff}.lg span{color:var(--t)}
.tg{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.bd{padding:20px 24px}.st{margin-bottom:16px}
.lb{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:6px;display:block}
.sl{width:100%;padding:10px 14px;border:1px solid var(--b);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tx);background:var(--bg)}
.sl:focus{outline:none;border-color:var(--t)}
.iw{display:flex;gap:8px}
.ii{flex:1;padding:10px 14px;border:1px solid var(--b);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tx)}
.ii:focus{outline:none;border-color:var(--t)}
.ab{padding:10px 16px;background:var(--tl);color:var(--td);border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ab:hover{background:#9FE1CB}
.ts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tg2{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--n);color:#E2E8F0;border-radius:20px;font-size:12px;font-weight:500}
.tr{width:14px;height:14px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:#E2E8F0;font-size:10px;cursor:pointer;padding:0}
.bb{width:100%;padding:13px;background:var(--t);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.bb:hover{background:#0D9090}.bb:disabled{background:var(--b);color:var(--mu);cursor:not-allowed}
.rs{border-top:1px solid var(--b);padding:20px 24px;display:none}.rs.v{display:block}
.rt{font-size:13px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kp{background:var(--bg2);border-radius:10px;padding:12px 14px}
.kp.p{background:var(--n);grid-column:span 2;display:flex;align-items:center;justify-content:space-between}
.kl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kp.p .kl{color:#64748B}.kv{font-size:22px;font-weight:700;color:var(--tx);line-height:1}
.kp.p .kv{font-size:28px;color:#fff}.sb{background:var(--t);color:#fff;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px}
.dv{height:1px;background:var(--b);margin:14px 0}
.mr{display:flex;justify-content:space-between;gap:8px;margin-bottom:14px}
.mi{flex:1;text-align:center;padding:8px;background:var(--bg2);border-radius:8px}
.mv{font-size:14px;font-weight:600;color:var(--tx)}.ml{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.ib-title{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.ib-grid{display:flex;flex-direction:column;gap:6px}
.ib-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-radius:10px;border-left:3px solid var(--t)}
.ib-name{font-size:13px;font-weight:600;color:var(--tx);text-transform:capitalize}
.ib-right{text-align:right}.ib-grams{font-size:15px;font-weight:700;color:var(--t)}
.ib-badge{display:inline-block;font-size:10px;background:var(--tl);color:var(--td);border-radius:10px;padding:2px 6px;margin-top:2px}
.ib-note{font-size:11px;color:var(--mu);margin-top:10px;text-align:center;font-style:italic}
.er{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:12px 14px;font-size:13px;color:#DC2626;display:none;margin-bottom:12px}
.er.v{display:block}.ld{text-align:center;padding:20px;color:var(--mu);font-size:14px;display:none}.ld.v{display:block}
.sp{display:inline-block;width:20px;height:20px;border:2px solid var(--b);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ft{padding:12px 24px 16px;text-align:center;border-top:1px solid var(--b)}
.ft a{font-size:12px;color:var(--t);text-decoration:none;font-weight:500}.ft span{font-size:12px;color:var(--mu)}
</style>
</head>
<body>
<div class="w">
  <div class="hd"><div class="lg">Pure<span>Fyul</span></div><div class="tg">Age-Specific Smoothie Builder</div></div>
  <div class="bd">
    <div class="st">
      <label class="lb" for="aud">Who is this for?</label>
      <select class="sl" id="aud">
        <option value="">Select age group...</option>
        <option value="Child 4-6">Child 4-6</option>
        <option value="Child 7-8">Child 7-8</option>
        <option value="Boy 9-13">Boy 9-13</option>
        <option value="Girl 9-13">Girl 9-13</option>
        <option value="Boy 14-18">Boy 14-18</option>
        <option value="Girl 14-18">Girl 14-18</option>
        <option value="Man 19-30">Man 19-30</option>
        <option value="Woman 19-30">Woman 19-30</option>
        <option value="Man 31-59">Man 31-59</option>
        <option value="Woman 31-59">Woman 31-59</option>
        <option value="Man 60+">Man 60+</option>
        <option value="Woman 60+">Woman 60+</option>
      </select>
    </div>
    <div class="st">
      <label class="lb">Ingredients</label>
      <div class="iw"><input class="ii" id="ing" type="text" placeholder="e.g. blueberry, oats, banana..."><button class="ab" id="addb">+ Add</button></div>
      <div class="ts" id="tags"></div>
    </div>
    <div class="er" id="err"></div>
    <button class="bb" id="buildb" disabled>Add 2+ ingredients to start</button>
  </div>
  <div class="ld" id="load"><div class="sp"></div><br>Building your smoothie...</div>
  <div class="rs" id="res">
    <div class="rt">Your Smoothie Nutrition</div>
    <div class="kg">
      <div class="kp p"><div><div class="kl">Calories</div><div class="kv" id="cal">-</div></div><div class="sb" id="srv">-</div></div>
      <div class="kp"><div class="kl">Protein</div><div class="kv" id="pro">-</div></div>
      <div class="kp"><div class="kl">Fiber</div><div class="kv" id="fib">-</div></div>
      <div class="kp"><div class="kl">Sugar</div><div class="kv" id="sug">-</div></div>
      <div class="kp"><div class="kl">Fat</div><div class="kv" id="fat">-</div></div>
    </div>
    <div class="dv"></div>
    <div class="mr">
      <div class="mi"><div class="mv" id="crb">-</div><div class="ml">Carbs</div></div>
      <div class="mi"><div class="mv" id="sod">-</div><div class="ml">Sodium</div></div>
    </div>
    <div class="dv"></div>
    <div class="ib-title">Age-specific ingredient amounts</div>
    <div class="ib-grid" id="ib-grid"></div>
    <div class="ib-note" id="ib-note"></div>
  </div>
  <div class="ft"><span>Powered by </span><a href="https://purefyul.com/app" target="_blank">PureFyul</a><span> - Free - Age-specific nutrition</span></div>
</div>
<script>
var FP={child_4_8:{apple:95,banana:55,mango:80,strawberries:75,strawberry:75,blueberries:65,blueberry:65,raspberries:60,raspberry:60,blackberries:60,blackberry:60,grapes:75,grape:75,peach:90,pear:95,pineapple:80,watermelon:110,orange:95,kiwi:75,papaya:80},child_9_13:{apple:120,banana:100,mango:120,strawberries:90,strawberry:90,blueberries:80,blueberry:80,raspberries:80,raspberry:80,blackberries:80,blackberry:80,grapes:90,grape:90,peach:120,pear:120,pineapple:110,watermelon:130,orange:120,kiwi:90,papaya:110,plum:80,cherry:80},teen_14_18:{apple:150,banana:120,mango:150,strawberries:120,strawberry:120,blueberries:120,blueberry:120,raspberries:120,raspberry:120,blackberries:120,blackberry:120,grapes:120,grape:120,peach:150,pear:150,pineapple:140,watermelon:170,orange:150,kiwi:100,papaya:140,cherry:120,plum:100},adult_19_30:{apple:150,banana:120,mango:150,strawberries:120,strawberry:120,blueberries:120,blueberry:120,raspberries:120,raspberry:120,blackberries:120,blackberry:120,grapes:120,grape:120,peach:150,pear:150,pineapple:140,watermelon:170,orange:150,kiwi:100,papaya:140,cherry:120,plum:100},woman_31_59:{apple:150,banana:120,mango:150,strawberries:120,strawberry:120,blueberries:120,blueberry:120,raspberries:120,raspberry:120,blackberries:120,blackberry:120,grapes:120,grape:120,peach:150,pear:150,pineapple:140,watermelon:170,orange:150,kiwi:100,papaya:140,cherry:120,plum:100},man_31_59:{apple:150,banana:120,mango:150,strawberries:120,strawberry:120,blueberries:120,blueberry:120,raspberries:120,raspberry:120,blackberries:120,blackberry:120,grapes:120,grape:120,peach:150,pear:150,pineapple:140,watermelon:170,orange:150,kiwi:100,papaya:140,cherry:120,plum:100},man_60_plus:{apple:100,banana:100,mango:100,strawberries:100,strawberry:100,blueberries:90,blueberry:90,raspberries:90,raspberry:90,blackberries:90,blackberry:90,grapes:90,grape:90,peach:100,pear:100,pineapple:110,watermelon:130,orange:100,kiwi:90,papaya:110,cherry:90,plum:90},woman_60_plus:{apple:100,banana:100,mango:100,strawberries:100,strawberry:100,blueberries:90,blueberry:90,raspberries:90,raspberry:90,blackberries:90,blackberry:90,grapes:90,grape:90,peach:100,pear:100,pineapple:110,watermelon:130,orange:100,kiwi:90,papaya:110,cherry:90,plum:90}};
var VP={child_4_8:{spinach:15,kale:15,cucumber:25,zucchini:25,carrot:25,pumpkin:25,avocado:15,cauliflower:15,beetroot:10,celery:10,broccoli:10},child_9_13:{spinach:20,kale:20,cucumber:35,zucchini:35,carrot:30,pumpkin:30,avocado:25,cauliflower:20,beetroot:15,celery:15,broccoli:15},teen_14_18:{spinach:30,kale:30,cucumber:50,zucchini:50,carrot:40,pumpkin:40,avocado:40,cauliflower:30,beetroot:25,celery:25,broccoli:25},adult_19_30:{spinach:40,kale:40,cucumber:60,zucchini:60,carrot:50,pumpkin:50,avocado:50,cauliflower:40,beetroot:30,celery:30,broccoli:30},woman_31_59:{spinach:40,kale:40,cucumber:60,zucchini:60,carrot:50,pumpkin:50,avocado:50,cauliflower:40,beetroot:30,celery:30,broccoli:30},man_31_59:{spinach:40,kale:40,cucumber:60,zucchini:60,carrot:50,pumpkin:50,avocado:50,cauliflower:40,beetroot:30,celery:30,broccoli:30},man_60_plus:{spinach:35,kale:35,cucumber:50,zucchini:50,carrot:45,pumpkin:45,avocado:45,cauliflower:35,beetroot:25,celery:25,broccoli:25},woman_60_plus:{spinach:35,kale:35,cucumber:50,zucchini:50,carrot:45,pumpkin:45,avocado:45,cauliflower:35,beetroot:25,celery:25,broccoli:25}};
var LP={child_4_8:150,child_9_13:150,teen_14_18:200,adult_19_30:240,woman_31_59:240,man_31_59:240,man_60_plus:200,woman_60_plus:200};
var NP={child_4_8:{peanut_butter:16,'peanut butter':16,almond_butter:16,'almond butter':16,oats:60,'greek yogurt':80,yogurt:80,'chia seeds':8,'chia seed':8,flaxseed:8,'hemp seeds':10,walnuts:15,almonds:15},child_9_13:{peanut_butter:20,'peanut butter':20,almond_butter:20,'almond butter':20,oats:80,'greek yogurt':100,yogurt:100,'chia seeds':10,'chia seed':10,flaxseed:10,'hemp seeds':15,walnuts:20,almonds:20},teen_14_18:{peanut_butter:32,'peanut butter':32,almond_butter:32,'almond butter':32,oats:117,'greek yogurt':150,yogurt:150,'chia seeds':15,'chia seed':15,flaxseed:15,'hemp seeds':20,walnuts:28,almonds:28},adult_19_30:{peanut_butter:32,'peanut butter':32,almond_butter:32,'almond butter':32,oats:117,'greek yogurt':170,yogurt:170,'chia seeds':15,'chia seed':15,flaxseed:15,'hemp seeds':20,walnuts:28,almonds:28},woman_31_59:{peanut_butter:32,'peanut butter':32,almond_butter:32,'almond butter':32,oats:117,'greek yogurt':170,yogurt:170,'chia seeds':15,'chia seed':15,flaxseed:15,'hemp seeds':20,walnuts:28,almonds:28},man_31_59:{peanut_butter:32,'peanut butter':32,almond_butter:32,'almond butter':32,oats:117,'greek yogurt':170,yogurt:170,'chia seeds':15,'chia seed':15,flaxseed:15,'hemp seeds':20,walnuts:28,almonds:28},man_60_plus:{peanut_butter:28,'peanut butter':28,almond_butter:28,'almond butter':28,oats:100,'greek yogurt':150,yogurt:150,'chia seeds':12,'chia seed':12,flaxseed:12,'hemp seeds':15,walnuts:20,almonds:20},woman_60_plus:{peanut_butter:28,'peanut butter':28,almond_butter:28,'almond butter':28,oats:100,'greek yogurt':150,yogurt:150,'chia seeds':12,'chia seed':12,flaxseed:12,'hemp seeds':15,walnuts:20,almonds:20}};
var LIQUIDS=['milk','oat milk','almond milk','soy milk','coconut milk','rice milk','hemp milk','pea milk','water','coconut water','juice','orange juice','apple juice'];
var VEGS=['spinach','kale','carrot','cucumber','zucchini','avocado','cauliflower','broccoli','beetroot','celery','pumpkin','sweet potato'];
function normalizeAgeKey(a){if(!a)return'adult_19_30';var k=a.toLowerCase().replace(/\s+/g,'-');if(k==='child-4-6'||k==='child-7-8')return'child_4_8';if(k==='girl-9-13'||k==='boy-9-13')return'child_9_13';if(k==='girl-14-18'||k==='boy-14-18')return'teen_14_18';if(k==='man-19-30'||k==='woman-19-30')return'adult_19_30';if(k==='woman-31-59')return'woman_31_59';if(k==='man-31-59')return'man_31_59';if(k==='man-60+')return'man_60_plus';if(k==='woman-60+')return'woman_60_plus';return'adult_19_30';}
function getAgeGrams(name,audience,apiG){var ak=normalizeAgeKey(audience);var kl=name.toLowerCase().trim();var isL=LIQUIDS.some(function(l){return kl.indexOf(l)!==-1;});if(isL)return{g:LP[ak]||240,b:'liquid'};var isV=VEGS.some(function(v){return kl.indexOf(v)!==-1;});if(isV){var vm=VP[ak]||VP.adult_19_30;var vg=vm[kl]||null;if(vg)return{g:vg,b:'vegetable'};}var fm=FP[ak]||FP.adult_19_30;var fg=fm[kl]||null;if(fg)return{g:fg,b:'fruit'};var nm=NP[ak]||NP.adult_19_30;var ng=nm[kl]||null;if(ng)return{g:ng,b:'other'};return{g:apiG||0,b:'usda'};}
var ings=[],ingEl=document.getElementById('ing'),tagsEl=document.getElementById('tags'),buildEl=document.getElementById('buildb'),addEl=document.getElementById('addb'),audEl=document.getElementById('aud'),errEl=document.getElementById('err'),loadEl=document.getElementById('load'),resEl=document.getElementById('res'),ibGrid=document.getElementById('ib-grid'),ibNote=document.getElementById('ib-note');
function addIng(){var v=ingEl.value.trim();if(!v)return;v.split(',').forEach(function(x){x=x.trim().toLowerCase();if(x&&ings.indexOf(x)===-1)ings.push(x);});ingEl.value='';renderTags();updateBtn();}
function removeIng(x){ings=ings.filter(function(i){return i!==x;});renderTags();updateBtn();}
function renderTags(){tagsEl.innerHTML='';ings.forEach(function(ing){var s=document.createElement('span');s.className='tg2';s.textContent=ing+' ';var b=document.createElement('button');b.className='tr';b.textContent='x';b.dataset.ing=ing;s.appendChild(b);tagsEl.appendChild(s);});tagsEl.querySelectorAll('.tr').forEach(function(b){b.addEventListener('click',function(){removeIng(this.dataset.ing);});});}
function updateBtn(){var ok=audEl.value&&ings.length>=2;buildEl.disabled=!ok;var n=2-ings.length;buildEl.textContent=ings.length<2?'Add '+Math.max(0,n)+' more ingredient'+(n!==1?'s':'')+' to start':'Build My Smoothie';}
function renderIngredients(ingredients,audience){ibGrid.innerHTML='';if(!ingredients||!ingredients.length)return;var total=0;ingredients.forEach(function(ing){var name=ing.display_name||ing.ingredient||'';var apiG=ing.serving_size_g||0;var r=getAgeGrams(name,audience,apiG);total+=r.g;var row=document.createElement('div');row.className='ib-row';var left=document.createElement('div');left.className='ib-name';left.textContent=name;var right=document.createElement('div');right.className='ib-right';var grams=document.createElement('div');grams.className='ib-grams';grams.textContent=Math.round(r.g)+'g';var badge=document.createElement('div');badge.className='ib-badge';badge.textContent=r.b==='usda'?'USDA standard':r.b;right.appendChild(grams);right.appendChild(badge);row.appendChild(left);row.appendChild(right);ibGrid.appendChild(row);});ibNote.textContent='Total: '+Math.round(total)+'g · Age-specific for '+audience;}
function build(){if(!audEl.value||ings.length<2)return;errEl.classList.remove('v');resEl.classList.remove('v');loadEl.classList.add('v');buildEl.disabled=true;var xhr=new XMLHttpRequest();xhr.open('POST','https://purefyul.com/api/analyze');xhr.setRequestHeader('Content-Type','application/json');xhr.onload=function(){loadEl.classList.remove('v');if(xhr.status===200){try{var d=JSON.parse(xhr.responseText);if(d.error)throw new Error(d.error);var n=d.total_nutrition||{};var ingredients=d.ingredients||[];var totalG=0;ingredients.forEach(function(i){totalG+=getAgeGrams(i.display_name||i.ingredient,audEl.value,i.serving_size_g||0).g;});document.getElementById('cal').textContent=Math.round(n.calories||0)+' kcal';document.getElementById('pro').textContent=(n.protein||0).toFixed(1)+'g';document.getElementById('fib').textContent=(n.fiber||0).toFixed(1)+'g';document.getElementById('sug').textContent=(n.sugar||0).toFixed(1)+'g';document.getElementById('fat').textContent=(n.fat||0).toFixed(1)+'g';document.getElementById('crb').textContent=(n.carbs||0).toFixed(1)+'g';document.getElementById('sod').textContent=Math.round(n.sodium||0)+'mg';document.getElementById('srv').textContent=Math.round(totalG)+'g portion';renderIngredients(ingredients,audEl.value);resEl.classList.add('v');}catch(e){errEl.textContent='Could not parse results. Try again.';errEl.classList.add('v');}}else{errEl.textContent='Could not analyze. Check ingredients and try again.';errEl.classList.add('v');}buildEl.disabled=false;updateBtn();};xhr.onerror=function(){loadEl.classList.remove('v');errEl.textContent='Network error. Please try again.';errEl.classList.add('v');buildEl.disabled=false;updateBtn();};xhr.send(JSON.stringify({ingredients:ings,audience:audEl.value,timing:'Breakfast'}));}
addEl.addEventListener('click',addIng);ingEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addIng();}});audEl.addEventListener('change',updateBtn);buildEl.addEventListener('click',build);
</script>
</body>
</html>
