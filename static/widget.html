<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureFyul Smoothie Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#0EA5A4;--tl:#E1F5EE;--td:#085041;--n:#0F172A;--b:#E2E8F0;--bg:#fff;--bg2:#F8FAFC;--tx:#0F172A;--mu:#94A3B8;--r:12px}
body{font-family:system-ui,-apple-system,sans-serif;background:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.w{width:100%;max-width:480px;background:var(--bg);border-radius:20px;border:1px solid var(--b);overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,.08)}
.hd{background:var(--n);padding:20px 24px 18px}
.lg{font-size:18px;font-weight:700;color:#fff}
.lg span{color:var(--t)}
.tg{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.bd{padding:20px 24px}
.st{margin-bottom:16px}
.lb{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:6px;display:block}
.sl{width:100%;padding:10px 14px;border:1px solid var(--b);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tx);background:var(--bg)}
.sl:focus{outline:none;border-color:var(--t)}
.iw{display:flex;gap:8px}
.ii{flex:1;padding:10px 14px;border:1px solid var(--b);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--tx)}
.ii:focus{outline:none;border-color:var(--t)}
.ab{padding:10px 16px;background:var(--tl);color:var(--td);border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tg2{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--n);color:#E2E8F0;border-radius:20px;font-size:12px;font-weight:500}
.tr{width:14px;height:14px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:#E2E8F0;font-size:10px;cursor:pointer;padding:0}
.bb{width:100%;padding:13px;background:var(--t);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.bb:disabled{background:var(--b);color:var(--mu);cursor:not-allowed}
.rs{border-top:1px solid var(--b);padding:20px 24px;display:none}
.rs.v{display:block}
.rt{font-size:13px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kp{background:var(--bg2);border-radius:10px;padding:12px 14px}
.kp.p{background:var(--n);grid-column:span 2;display:flex;align-items:center;justify-content:space-between}
.kl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kp.p .kl{color:#64748B}
.kv{font-size:22px;font-weight:700;color:var(--tx);line-height:1}
.kp.p .kv{font-size:28px;color:#fff}
.ku{font-size:12px;font-weight:400;color:var(--mu);margin-left:2px}
.kp.p .ku{color:#64748B}
.sb{background:var(--t);color:#fff;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px}
.dv{height:1px;background:var(--b);margin:14px 0}
.mr{display:flex;justify-content:space-between;gap:8px}
.mi{flex:1;text-align:center;padding:8px;background:var(--bg2);border-radius:8px}
.mv{font-size:14px;font-weight:600;color:var(--tx)}
.ml{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.er{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:12px 14px;font-size:13px;color:#DC2626;display:none;margin-bottom:12px}
.er.v{display:block}
.ld{text-align:center;padding:20px;color:var(--mu);font-size:14px;display:none}
.ld.v{display:block}
.sp{display:inline-block;width:20px;height:20px;border:2px solid var(--b);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ft{padding:12px 24px 16px;text-align:center;border-top:1px solid var(--b)}
.ft a{font-size:12px;color:var(--t);text-decoration:none;font-weight:500}
.ft span{font-size:12px;color:var(--mu)}
</style>
</head>
<body>
<div class="w">
  <div class="hd">
    <div class="lg">Pure<span>Fyul</span></div>
    <div class="tg">Smoothie Nutrition Builder</div>
  </div>
  <div class="bd">
    <div class="st">
      <label class="lb" for="aud">Who is this for?</label>
      <select class="sl" id="aud">
        <option value="">Select age group...</option>
        <option value="Child 4-6">Child 4-6</option>
        <option value="Child 7-8">Child 7-8</option>
        <option value="Boy 9-13">Boy 9-13</option>
        <option value="Girl 9-13">Girl 9-13</option>
        <option value="Boy 14-18">Boy 14-18</option>
        <option value="Girl 14-18">Girl 14-18</option>
        <option value="Man 19-30">Man 19-30</option>
        <option value="Woman 19-30">Woman 19-30</option>
        <option value="Man 31-59">Man 31-59</option>
        <option value="Woman 31-59">Woman 31-59</option>
        <option value="Man 60+">Man 60+</option>
        <option value="Woman 60+">Woman 60+</option>
      </select>
    </div>
    <div class="st">
      <label class="lb">Ingredients</label>
      <div class="iw">
        <input class="ii" id="ing" type="text" placeholder="e.g. blueberry, oats...">
        <button class="ab" id="addb">+ Add</button>
      </div>
      <div class="ts" id="tags"></div>
    </div>
    <div class="er" id="err"></div>
    <button class="bb" id="buildb" disabled>Add 2+ ingredients to start</button>
  </div>
  <div class="ld" id="load"><div class="sp"></div><br>Analyzing...</div>
  <div class="rs" id="res">
    <div class="rt">Your Smoothie Nutrition</div>
    <div class="kg">
      <div class="kp p">
        <div><div class="kl">Calories</div><div class="kv" id="cal">-</div></div>
        <div class="sb" id="srv">-</div>
      </div>
      <div class="kp"><div class="kl">Protein</div><div class="kv" id="pro">-</div></div>
      <div class="kp"><div class="kl">Fiber</div><div class="kv" id="fib">-</div></div>
      <div class="kp"><div class="kl">Sugar</div><div class="kv" id="sug">-</div></div>
      <div class="kp"><div class="kl">Fat</div><div class="kv" id="fat">-</div></div>
    </div>
    <div class="dv"></div>
    <div class="mr">
      <div class="mi"><div class="mv" id="crb">-</div><div class="ml">Carbs</div></div>
      <div class="mi"><div class="mv" id="sod">-</div><div class="ml">Sodium</div></div>
    </div>
  </div>
  <div class="ft"><span>Powered by </span><a href="https://purefyul.com/app" target="_blank">PureFyul</a><span> - Free</span></div>
</div>
<script>
var ings=[];
var ingEl=document.getElementById('ing');
var tagsEl=document.getElementById('tags');
var buildEl=document.getElementById('buildb');
var addEl=document.getElementById('addb');
var audEl=document.getElementById('aud');
var errEl=document.getElementById('err');
var loadEl=document.getElementById('load');
var resEl=document.getElementById('res');

function addIng(){
  var v=ingEl.value.trim();
  if(!v)return;
  v.split(',').forEach(function(x){
    x=x.trim().toLowerCase();
    if(x&&ings.indexOf(x)===-1)ings.push(x);
  });
  ingEl.value='';
  renderTags();
  updateBtn();
}

function removeIng(x){
  ings=ings.filter(function(i){return i!==x;});
  renderTags();
  updateBtn();
}

function renderTags(){
  tagsEl.innerHTML='';
  ings.forEach(function(ing){
    var s=document.createElement('span');
    s.className='tg2';
    s.textContent=ing+' ';
    var b=document.createElement('button');
    b.className='tr';
    b.textContent='x';
    b.dataset.ing=ing;
    tagsEl.appendChild(s);
    s.appendChild(b);
  });
  tagsEl.querySelectorAll('.tr').forEach(function(b){
    b.addEventListener('click',function(){removeIng(this.dataset.ing);});
  });
}

function updateBtn(){
  var ok=audEl.value&&ings.length>=2;
  buildEl.disabled=!ok;
  var n=2-ings.length;
  buildEl.textContent=ings.length<2?'Add '+Math.max(0,n)+' more ingredient'+(n!==1?'s':'')+' to start':'Build My Smoothie';
}

function build(){
  if(!audEl.value||ings.length<2)return;
  errEl.classList.remove('v');
  resEl.classList.remove('v');
  loadEl.classList.add('v');
  buildEl.disabled=true;
  var xhr=new XMLHttpRequest();
  xhr.open('POST','https://purefyul.com/api/analyze');
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    loadEl.classList.remove('v');
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText);
        if(d.error)throw new Error(d.error);
        var n=d.total_nutrition||d.nutrition||{};
        var sv=d.recommended_serving||d.serving_size||null;
        document.getElementById('cal').textContent=Math.round(n.calories||0)+' kcal';
        document.getElementById('pro').textContent=(n.protein||0).toFixed(1)+'g';
        document.getElementById('fib').textContent=(n.fiber||0).toFixed(1)+'g';
        document.getElementById('sug').textContent=(n.sugar||0).toFixed(1)+'g';
        document.getElementById('fat').textContent=(n.fat||0).toFixed(1)+'g';
        document.getElementById('crb').textContent=(n.carbs||0).toFixed(1)+'g';
        document.getElementById('sod').textContent=Math.round(n.sodium||0)+'mg';
        document.getElementById('srv').textContent=sv?Math.round(sv)+'g portion':audEl.value;
        resEl.classList.add('v');
      }catch(e){
        errEl.textContent='Could not parse results. Try again.';
        errEl.classList.add('v');
      }
    }else{
      errEl.textContent='Could not analyze. Check ingredients and try again.';
      errEl.classList.add('v');
    }
    buildEl.disabled=false;
    updateBtn();
  };
  xhr.onerror=function(){
    loadEl.classList.remove('v');
    errEl.textContent='Network error. Please try again.';
    errEl.classList.add('v');
    buildEl.disabled=false;
    updateBtn();
  };
  xhr.send(JSON.stringify({ingredients:ings,audience:audEl.value,timing:'Breakfast'}));
}

addEl.addEventListener('click',addIng);
ingEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addIng();}});
audEl.addEventListener('change',updateBtn);
buildEl.addEventListener('click',build);
</script>
</body>
</html>
