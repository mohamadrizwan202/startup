<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FA39A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-30" y="-30" width="1460" height="920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-30" y="-30" width="1460" height="920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="50" width="1260" height="760" rx="30" fill="#F7FAFA"/>
    <rect x="70" y="50" width="1260" height="760" rx="30" stroke="#0B1220" stroke-opacity="0.08"/>
  </g>

  <rect x="70" y="50" width="1260" height="170" rx="30" fill="url(#bg)"/>
  <rect x="70" y="190" width="1260" height="30" fill="url(#bg)"/>

  <text x="120" y="120" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#FFFFFF">PureFyul</text>
  <text x="980" y="120" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="#EFFFFD" opacity="0.92">About</text>
  <text x="1060" y="120" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="#EFFFFD" opacity="0.92">Pricing</text>
  <text x="1150" y="120" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="#EFFFFD" opacity="0.92">Contact</text>

  <text x="520" y="155" text-anchor="middle"
