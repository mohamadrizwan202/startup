    <text x="970" y="465" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="24" font-weight="900" fill="#0B1220">2.1g</text>

    <rect x="1120" y="400" width="170" height="92" rx="16" fill="#F6FBFB" stroke="#0B1220" stroke-opacity="0.10"/>
    <text x="1140" y="432" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="900" fill="#0B1220" opacity="0.55">FIBER</text>
    <text x="1140" y="465" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="24" font-weight="900" fill="#0B1220">0.2g</text>
  </g>

  <g>
    <rect x="780" y="510" width="510" height="235" rx="18" fill="#FFFFFF" stroke="#0B1220" stroke-opacity="0.10"/>
    <text x="810" y="545" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="900" fill="#0B1220">Notes</text>

    <rect x="810" y="565" width="460" height="1" fill="#0B1220" opacity="0.08"/>

    <text x="810" y="595" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="800" fill="#0B1220" opacity="0.70">• Typical serving sizes vary</text>
    <text x="810" y="620" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="800" fill="#0B1220" opacity="0.70">• Check interactions if you take medication</text>
    <text x="810" y="645" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="800" fill="#0B1220" opacity="0.70">• Allergen info may depend on processing</text>

    <rect x="810" y="675" width="220" height="36" rx="12" fill="#E8FBF8" stroke="#0F766E" stroke-opacity="0.18"/>
    <text x="920" y="699" text-anchor="middle" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="900" fill="#0F766E">Allergen: none listed</text>

    <rect x="1040" y="675" width="230" height="36" rx="12" fill="#F6FBFB" stroke="#0B1220" stroke-opacity="0.10"/>
    <text x="1155" y="699" text-anchor="middle" font-family="Outfit, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="900" fill="#0B1220" opacity="0.70">Data varies by source</text>
