    Explore health categories, discover ingredients, and analyze nutrition data
  </text>

  <!-- tab switch (Ingredient Analysis selected) -->
  <g filter="url(#soft)">
    <rect x="470" y="205" width="560" height="56" rx="18" fill="#0E8E86" opacity="0.75"/>
